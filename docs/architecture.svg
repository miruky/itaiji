<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" role="img" aria-label="itaijiのアーキテクチャ図">
  <title>itaijiのアーキテクチャ: 字体データから変換と字典引きを導き、UIで提示する流れ</title>
  <style>
    .box { fill: #f6f3ec; stroke: #c9c1ad; rx: 2; }
    .zone { fill: none; stroke: #ddd6c5; rx: 2; }
    .t { font-family: 'Hiragino Sans','Noto Sans JP',system-ui,sans-serif; fill: #211f19; }
    .h { font-size: 13px; font-weight: 600; }
    .s { font-size: 11px; fill: #837d6e; }
    .zl { font-size: 11px; font-weight: 600; fill: #2f6b49; letter-spacing: 2px; text-transform: uppercase; }
    .arrow { stroke: #837d6e; stroke-width: 1.4; fill: none; marker-end: url(#head); }
    @media (prefers-color-scheme: dark) {
      .box { fill: #1d1b15; stroke: #43402f; }
      .zone { stroke: #322f25; }
      .t { fill: #ece6d7; }
      .s { fill: #8c8472; }
      .zl { fill: #84c9a4; }
      .arrow { stroke: #8c8472; }
      #head path { fill: #8c8472; }
    }
  </style>
  <defs>
    <marker id="head" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0 0 L7 4 L0 8 Z" fill="#837d6e"/>
    </marker>
  </defs>

  <rect class="zone" x="20" y="20" width="740" height="96"/>
  <text class="t zl" x="36" y="44">字体データ(src/lib/data)</text>
  <rect class="box" x="36" y="56" width="344" height="44"/>
  <text class="t h" x="52" y="76">kyujitai.ts</text>
  <text class="t s" x="52" y="92">新旧字体240組と、旧字体側だけの一方向対応(辨・瓣・辯など)</text>
  <rect class="box" x="400" y="56" width="344" height="44"/>
  <text class="t h" x="416" y="76">variants.ts</text>
  <text class="t s" x="416" y="92">髙・﨑・𠮷など人名異体字のグループと注記</text>

  <path class="arrow" d="M208 116 V144"/>
  <path class="arrow" d="M572 116 V144"/>

  <rect class="box" x="36" y="148" width="344" height="64"/>
  <text class="t h" x="52" y="170">convert.ts</text>
  <text class="t s" x="52" y="187">3方向の写像を構築し、コードポイント単位で置換。</text>
  <text class="t s" x="52" y="202">変わった字は元の字つきの断片として返す</text>
  <rect class="box" x="400" y="148" width="344" height="64"/>
  <text class="t h" x="416" y="170">lookup.ts</text>
  <text class="t s" x="416" y="187">どの字からでも同じグループへ到達できる索引。</text>
  <text class="t s" x="416" y="202">弁のように旧字体が複数ある字も1グループに畳む</text>

  <path class="arrow" d="M208 212 V240"/>
  <path class="arrow" d="M572 212 V240"/>

  <rect class="zone" x="20" y="244" width="740" height="136"/>
  <text class="t zl" x="36" y="268">UI(main.ts)</text>
  <rect class="box" x="36" y="280" width="226" height="84"/>
  <text class="t h" x="52" y="302">変換ビュー</text>
  <text class="t s" x="52" y="319">3モードのタブ。変わった字を</text>
  <text class="t s" x="52" y="334">ハイライトし、元の字を表示</text>
  <rect class="box" x="278" y="280" width="226" height="84"/>
  <text class="t h" x="294" y="302">字典</text>
  <text class="t s" x="294" y="319">検索とグループ一覧。結果の字を</text>
  <text class="t s" x="294" y="334">クリックしても引ける</text>
  <rect class="box" x="520" y="280" width="224" height="84"/>
  <text class="t h" x="536" y="302">入出力</text>
  <text class="t s" x="536" y="319">コピー・出力の入力への差し戻し・</text>
  <text class="t s" x="536" y="334">localStorageへの保存</text>
</svg>
